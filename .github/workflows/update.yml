name: Actualisation Kworb Ariana Grande

on:
  schedule:
    # S'exécute toutes les heures à la minute 0 (ex: 18h00, 19h00, 20h00...)
    - cron: '*/15 * * * *'
  workflow_dispatch: # Permet d'avoir un bouton pour le lancer manuellement !

permissions:
  contents: write # Autorise le robot à sauvegarder les nouveaux CSV et HTML

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Récupération du code
        uses: actions/checkout@v4

      - name: 🐍 Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔍 Lancement de la récupération (Kworb)
        run: python chargement.py

      - name: 📊 Création du Dashboard Web
        run: python creer_dashboard.py

      - name: 💾 Sauvegarde des nouvelles données
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add -A
          git commit -m "Mise à jour auto des données Kworb" || echo "Aucune nouvelle donnée à sauvegarder"
          git push
